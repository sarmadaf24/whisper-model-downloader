name: Download Whisper Model to Repository

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Direct URL to the model file'
        required: true
        default: 'https://github.com/ggerganov/whisper.cpp/raw/master/models/ggml-base.bin'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download model file
        run: |
          echo "Downloading model from ${{ github.event.inputs.model_url }}"
          curl -L -o model.bin "${{ github.event.inputs.model_url }}"
          echo "✅ Download complete! File size: $(du -h model.bin | cut -f1)"

      - name: Create release directory
        run: mkdir -p models

      - name: Move model to models directory
        run: mv model.bin ./models/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.0"
          files: |
            ./models/model.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-model
          path: ./models/model.bin
          retention-days: 30
