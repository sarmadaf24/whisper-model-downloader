name: Download Whisper Model to Repository

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Direct URL to the model file'
        required: true
        default: 'https://github.com/ggerganov/whisper.cpp/raw/master/models/ggml-base.bin'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # برای آپلود Artifact نیازه
      contents: read   # فقط خوندن مخزن
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download model file
        run: |
          echo "Downloading model from ${{ github.event.inputs.model_url }}"
          curl -L -o model.bin "${{ github.event.inputs.model_url }}"
          echo "✅ Download complete!"

      - name: Create models directory
        run: mkdir -p models

      - name: Move model to models directory
        run: mv model.bin ./models/

      - name: Upload as artifact (only way to download)
        uses: actions/upload-artifact@v4
        with:
          name: whisper-model
          path: ./models/model.bin
          retention-days: 30
